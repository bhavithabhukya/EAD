<!doctype html>
<html>
  <body>
    <h1>REVERSE OF STRING</h1>
    <script>
      let reversestr = function (str) {
        let reversed = "";
        for (let i = str.length - 1; i >= 0; i--) {
          reversed = reversed + str[i];
        }
        return reversed;
      };
      console.log(reversestr("hello"));
      console.log(reversestr("mommy"));
    </script>
  </body>
</html>
