<!doctype html>
<html>
  <head>
    <title>bootstrap</title>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />

    <style>
      .header {
        background-color: blue;
        text-align: center;
        padding: 15px;
        font-weight: bold;
      }
      .box {
        background-color: aquamarine;
        color: beige;
      }
      .break {
        background-color: bisque;
        color: beige;
      }
    </style>
  </head>
  <body>
    <div class="container mt-4">
      <h2 class="text-center">Class Time Table</h2>
      <div class="row">
        <div class="col header">Time</div>
        <div class="col header">Monday</div>
        <div class="col header">Tuesday</div>
        <div class="col header">wednesday</div>
        <div class="col header">Thursday</div>
        <div class="col header">Friday</div>
      </div>
      <div class="row">
        <div class="col box">9:00-10:00</div>
        <div class="col box">EAD</div>
      </div>
    </div>
  </body>
</html>
