<!doctype html>
<html>
  <body>
    <h1>Factorial of a number</h1>
    <script>
      function factorial(n) {
        let result = 1;
        for (let i = 1; i <= n; i++) {
          result = result * i;
        }
        return result;
      }
      console.log(factorial(6));
    </script>
  </body>
</html>
